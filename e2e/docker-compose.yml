services:
  postgres:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    environment:
      POSTGRES_DB: redmine
      POSTGRES_USER: redmine
      POSTGRES_PASSWORD: redmine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmine"]
      interval: 5s
      retries: 10

  redmine:
    build:
      context: .
      args:
        REDMINE_VERSION: ${REDMINE_VERSION:-5.1}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine
      REDMINE_SECRET_KEY_BASE: e2e-test-secret-key-base
      REDMINE_PLUGINS_MIGRATE: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 30
