apiVersion: gh-infra/v1
kind: Repository
metadata:
  name: deno-redmine
  owner: Omochice
spec:
  description: Redmine REST-API wrapper library for deno
  homepage: https://deno.land/x/deno_redmine
  visibility: public
  archived: false
  features:
    issues: true
    projects: true
    wiki: true
    discussions: false
    pull_requests: true
  merge_strategy:
    allow_merge_commit: false
    allow_squash_merge: true
    allow_rebase_merge: false
    allow_auto_merge: true
    auto_delete_head_branches: true
    squash_merge_commit_title: COMMIT_OR_PR_TITLE
    squash_merge_commit_message: COMMIT_MESSAGES
    merge_commit_title: MERGE_MESSAGE
    merge_commit_message: PR_TITLE
  release_immutability: true
  security:
    vulnerability_alerts: true
    automated_security_fixes: true
    private_vulnerability_reporting: true
  rulesets:
    - name: default
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include:
            - ~DEFAULT_BRANCH
      rules:
        pull_request:
          required_approving_review_count: 0
          dismiss_stale_reviews_on_push: false
          require_code_owner_review: false
          require_last_push_approval: false
          required_review_thread_resolution: false
        required_status_checks:
          strict_required_status_checks_policy: true
          contexts:
            - context: status-check
              app: github-actions
        non_fast_forward: true
        deletion: true
        creation: false
        required_linear_history: false
        required_signatures: false
  actions:
    enabled: true
    allowed_actions: all
    sha_pinning_required: true
    workflow_permissions: read
    can_approve_pull_requests: true
    fork_pr_approval: first_time_contributors
  variables:
    - name: RELEASE_CLIENT_ID
      value: Iv23liwM30lqoERe9vXr
